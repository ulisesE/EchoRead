<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#f472b6" />
    </linearGradient>
  </defs>
  <!-- Dark Background -->
  <rect width="512" height="512" rx="112" fill="#080c14"/>
  <!-- Glowing border effect -->
  <rect width="496" height="496" x="8" y="8" rx="104" fill="none" stroke="url(#grad)" stroke-width="6" opacity="0.3"/>
  
  <!-- Book and Wave Graphic -->
  <g transform="translate(128, 128)">
    <!-- Book outline -->
    <path d="M32 208h80a16 16 0 0 0 16-16V32a16 16 0 0 0-16-16H32A16 16 0 0 0 16 32v160a16 16 0 0 0 16 16z" fill="none" stroke="url(#grad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M128 208h80a16 16 0 0 0 16-16V32a16 16 0 0 0-16-16H128a16 16 0 0 0-16 16v160a16 16 0 0 0 16 16z" fill="none" stroke="url(#grad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M32 208a16 16 0 0 0 16 16h80" fill="none" stroke="url(#grad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M128 224h80a16 16 0 0 0 16-16" fill="none" stroke="url(#grad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Soundwaves flowing upwards from the book center -->
    <path d="M100 120 a 24 24 0 0 1 56 0" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
    <path d="M80 100 a 48 48 0 0 1 96 0" fill="none" stroke="url(#grad)" stroke-width="12" stroke-linecap="round" opacity="0.75"/>
    <path d="M60 80 a 72 72 0 0 1 136 0" fill="none" stroke="url(#grad)" stroke-width="14" stroke-linecap="round" opacity="0.4"/>
  </g>
</svg>
